    <body>
        <form>
            <input type="text" id="nombre" placeholder="Nombre">

        </form>

            </tr>
        </thead>
        <tbody id="bodyTable">
        </tbody>
        </table>
        <table border="1">

                <tr>
                    <th>Suma</th>
                    <th>Media</th>
                    <th>Máximo</th>
                    <th>Mínimo</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <th id="suma"></th>
                    <th id="media"></th>
                    <th id="max"></th>
                    <th id="min"></th>
                </tr>
            </tbody>
        </table>
        <script>
            let suma = 0;
            let max = Number.MIN_VALUE;
            let min = Number.MAX_VALUE;
            let cantidad = 0;

            document.querySelector('#botoncin').addEventListener("click", function(){
                $(document).ready(function(){
                    let obj = {nombre: $("#nombre").val(), apellido: $("#apellido").val(), ciudad: $("#ciudad").val(), edad: $("#edad").val()};
                   
                    objSerializado = serializar(obj);

                    objDeserializado = deserializar(objSerializado);

                    if (objDeserializado.nombre == "" || objDeserializado.apellido == "" || objDeserializado.ciudad == "" || objDeserializado.edad == ""){
                        alert("Uno de los campos está vacío");
                        return;
                    }

                    $("#bodyTable").append(nuevaFila(objDeserializado));

                    $("#suma").text(suma);
                    $("#media").text(media);
                    $("#max").text(max);
                    $("#min").text(min);

                    let edad = new Number(objDeserializado.edad);

                    if (edad >= 0){
                        cantidad++;
                        suma += edad;
                        media = suma/cantidad;

                        if(edad > max){
                            max = edad;
                        } else if(edad < min){
                            min = edad;
                        }

                        $("#suma").text(suma);
                        $("#media").text(media);
                        $("#max").text(max);
                        $("#min").text(min);
                    }

                });
            });

            function nuevaFila(objDeserializado){
                return "<tr>" +
                        "<td>" + objDeserializado.nombre + "</td>" +
                        "<td>" + objDeserializado.apellido + "</td>" +
                        "<td>" + objDeserializado.ciudad + "</td>" +
                        "<td>" + objDeserializado.edad + "</td>" +
                        "</tr>";
            }

            }

                return JSON.parse(obj);
            }

        </script>
    </body>
</html>
