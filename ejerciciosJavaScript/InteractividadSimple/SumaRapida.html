<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Suma Rápida</title>
    </head>
    <body>
        <script>
           let firstNum = new Number(prompt("Introduce un número, por favor: "));
           let secondNum = new Number(prompt("Introduce otro número, por favor: "));

           let sum = firstNum + secondNum;

           alert(`Sumar los dos números introducidos da ${sum}`);
        </script>
    </body>
</html>
