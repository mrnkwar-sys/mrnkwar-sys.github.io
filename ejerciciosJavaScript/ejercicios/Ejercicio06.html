<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Ejercicios 2 - Ejercicio 05</title>
    </head>
    <body>
        <p id="numbers"></p>
        <script>
           let num = document.getElementById("numbers");
           let sum = 0;

           for (let i = 0; i <= 100; i++){
            sum += i;
           }

           num.textContent = `${sum}`;
        </script>
    </body>
</html>
