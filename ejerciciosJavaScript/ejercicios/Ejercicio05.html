<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Ejercicios 2 - Ejercicio 04</title>
    </head>
    <body>
        <p id="numbers"></p>
        <script>
           let num = document.getElementById("numbers");

           for (let i = 0; i <= 10; i++){
            if (i%2 == 0){
                num.textContent += `${i} `;
            }
           }
        </script>
    </body>
</html>
