<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Ejercicios 1 - Ejercicio 01</title>
    </head>
    <body>
        <p id="presentation"></p>
        <script>
           let name = "Raquel";
           let edad = "19";

           let message = document.getElementById("presentation");
           message.textContent = `Mi nombre es ${name} y tengo ${edad} años`;

           let firstNum = 20;
           let secondNum = 10;

           let sum = firstNum + secondNum;
           console.log(sum);
           let subtract = firstNum - secondNum;
           console.log(subtract);
           let multiply = firstNum*secondNum;
           console.log(multiply);
           let division = firstNum/secondNum;
           console.log(division);
        </script>
