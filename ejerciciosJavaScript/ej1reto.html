    <script>

            $("#edad").text(json_deserializado.edad);
            $("#ciudad").text(json_deserializado.ciudad);
        });

        function serializar(obj){
            return JSON.stringify(obj);
        }

        function deserializar(obj){
            return JSON.parse(obj);
        }
