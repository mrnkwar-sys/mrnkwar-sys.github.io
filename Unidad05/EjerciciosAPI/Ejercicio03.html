<!DOCTYPE html>
<html>
    <head>
        <title>Ejercicio 03: Geolocaliza una IP</title>
    </head>
    <body>
        <h1>Buscador de IP</h1>
        
        <input type="text" id="ipInput" placeholder="Introduce una IP (ej: 8.8.8.8)">
        <button id="botonBuscar">Buscar</button>
        <div id="visorMapa"></div>

        <script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>
        <script>
            const ipIntroducida = $("#ipInput").val();
            const boton = $("#botonBuscar");
            const mapa = $("#visorMapa");

            boton.on("click", async function(){
                if (ipIntroducida === ""){
                    const consulta = await fetch(`http://ip-api.com/json/${ipIntroducida}`);
                    const respuesta = await consulta.json();

                    if (respuesta.status === "success"){
                        const latitud = respuesta.lat;
                        const longitud = respuesta.lon;

                        const urlMapa = `https://maps.google.com/maps?q=${latitud},${longitud}&z=15&output=embed`;

                        mapa.html(`<iframe src=${urlMapa} width="100%" height="400" frameborder="0" style="border:0"></iframe>`);
                    } else {
                        alert("No se ha podido localizar esa IP");
                    }
                } else {
                    alert("Introduce una direccion IP");
                }
            });
