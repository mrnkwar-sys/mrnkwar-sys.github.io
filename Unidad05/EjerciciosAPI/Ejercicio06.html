<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 06: Generador de Chistes</title>
</head>
<body>

    <h1>Chuck Norris Joke Generator</h1>
    
    <select id="selectorCategorias">
        <option value="">Selecciona una categoría...</option>
    </select>

    <button id="botonChiste">Cuentame un chiste</button>

    <div id="chiste" style="padding-top: 10px;"></div>

    <h4>Ultimos chistes vistos</h4>
    <div id="ultimosChistes"></div>

    <script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>
    <script>

        let listaChistes = [];

        document.addEventListener("DOMContentLoaded", function(){
            obtenerCategorias();
        });

        async function obtenerCategorias(){
            const consulta = await fetch("https://api.chucknorris.io/jokes/categories");
            const respuesta = await consulta.json();
            const select = $("#selectorCategorias");

            respuesta.forEach(categoria => {
                select.append(`<option value="${categoria}">${categoria}</option>`);
            });
        }

        $("#botonChiste").on("click", async function(){
            let categoriaSeleccionada = $("#selectorCategorias").val();

            const consulta2 = await fetch(`https://api.chucknorris.io/jokes/random?category=${categoriaSeleccionada}`);
            const respuesta2 = await consulta2.json();

            $("#chiste").html(`${respuesta2.value}`);

            guardarChistes(respuesta2.value);
        });

        function guardarChistes(chiste){
            listaChistes.push(`${chiste}<br>`);

            if (listaChistes.length > 5){
                listaChistes.splice(0, 1);
            }

            mostrarUltimosChistes(listaChistes);
        }

        function mostrarUltimosChistes(lista){
            $("#ultimosChistes").html(lista);
        }
    </script>
</body>
</html>
