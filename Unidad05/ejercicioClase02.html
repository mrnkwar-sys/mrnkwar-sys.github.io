<!DOCTYPE html>
<html>
    <head>
        <title>Ejercicio Clase 02</title>
    </head>
    <body>
        <script>
            // Pedimos la información de un usuario específico
                fetch('https://jsonplaceholder.typicode.com/users/1')
            // Convertimos el texto JSON a Objeto JS
                .then(respuesta => respuesta.json()) 
                .then(usuario => {
            // Ejercicio: Acceder a propiedades anidadas
                    console.log("Nombre del usuario:", usuario.name);
                    console.log("Nombre del usuario:", respuesta.name);
                    console.log("Ciudad:", usuario.address.city);
                    console.log("Latitud:", usuario.address.geo.lat);
                });
        </script>
    </body>
</html>
