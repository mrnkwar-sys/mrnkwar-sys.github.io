<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <script
            src="https://code.jquery.com/jquery-4.0.0.min.js"
            integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao="
            crossorigin="anonymous"></script>
    </head>
    <body>
        <form>
            <input type="text" id="nombreInsertado" placeholder="Nombre">
            <input type="text" id="apellidosInsertado" placeholder="Apellidos">
            <input type="text" id="ciudadInsertada" placeholder="Ciudad">
            <input type="number" id="edadInsertada" placeholder="Edad">
        </form>
        <button id="enviar">Enviar</button>
        <br>
        <table border="1">
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Apellidos</th>
                <th>Ciudad</th>
                <th>Edad</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td id="nombre"></td>
                <td id="apellidos"></td>
                <td id="ciudad"></td>
                <td id="edad"></td>
            </tr>
        </tbody>
        </table>
    </body>
    <script>
        document.getElementById("enviar").addEventListener("click", function(event){
            let nombreJs = document.getElementById("nombreInsertado").value;
            let apellidosJs = document.getElementById("apellidosInsertado").value;
            let ciudadJs = document.getElementById("ciudadInsertada").value;
            let edadJs = document.getElementById("edadInsertada").value;

            let obj = {nombreJs, apellidosJs, ciudadJs, edadJs};
            console.log(obj);

            json_serializado = serializar(obj);

            json_deserializado = deserializar(json_serializado);

            $("#nombre").text(json_deserializado.nombreJs);
            $("#apellidos").text(json_deserializado.apellidosJs);
            $("#edad").text(json_deserializado.edadJs);
            $("#ciudad").text(json_deserializado.ciudadJs);

            recibir(obj);
            enviar(obj);
        });

        function serializar(obj){
            return JSON.stringify(obj);
        }

        function deserializar(obj){
            return JSON.parse(obj);
        }

        function recibir(obj){
            console.log("Serializado:" + json_serializado);
            return serializar(obj);
        }

        function enviar(obj){
            console.log("Deserializado: " + json_deserializado);
            return deserializar(json_serializado);
        }
    </script>
</html>
