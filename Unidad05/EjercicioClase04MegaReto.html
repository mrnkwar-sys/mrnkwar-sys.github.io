<!DOCTYPE html>
<html>
    <head>
        <title>Ejercicio 02. Insertar datos dinámicos</title>
    </head>
    <body>
        <form>
            <input type="text" id="nombre" placeholder="Nombre">
            <input type="text" id="apellido" placeholder="Apellido">
            <input type="text" id="ciudad" placeholder="Ciudad">
            <input type="number" id="edad" placeholder="Edad">
            <button type="button" id="botoncin">Pulsa y observa</button>
        </form>
        <table border="1">
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Apellidos</th>
                <th>Ciudad</th>
                <th>Edad</th>
            </tr>
        </thead>
        <tbody id="bodyTable">
        </tbody>
        </table>
        <br>
        <table border="1">
            <thead>
                <tr>
                    <th>Suma</th>
                    <th>Media</th>
                    <th>Máximo</th>
                    <th>Mínimo</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td id="suma"></td>
                    <td id="media"></td>
                    <td id="max"></td>
                    <td id="min"></td>
                </tr>
            </tbody>
        </table>
        <script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>
        <script>
            let arrayCalculos = [];

            $(document).ready(function(){

                $("#botoncin").click(function(){
                    let calculos = {
                        suma: 0,
                        media: 0,
                        maximo: 0,
                        minimo: 9999
                    };

                    let datos = getInputs();
                    let bodyTable = $("#bodyTable");
                    insertarEnTabla(bodyTable, datos);

                    let edad = new Number(datos.edad);
                    arrayCalculos.push(datos.edad);
                    console.log(arrayCalculos);

                    let resultado = calcular(calculos);
                    pintarCalculos(resultado);

                });


            });

            function getInputs(){
                if ($("#nombre").val().trim() === "" || $("#apellido").val().trim() === "" || $("#ciudad").val().trim() === "" || $("#edad").val().trim() === ""){
                    alert("Todos los campos deben estar rellenados");
                } else {
                    return {
                    nombre: $("#nombre").val(),
                    apellidos: $("#apellido").val(),
                    ciudad: $("#ciudad").val(),
                    edad: $("#edad").val()
                    }
                }
            };

            function insertarEnTabla(contenedor, datos){
                let tr = $("<tr>");
                tr.append(creaCelda(datos.nombre));
                tr.append(creaCelda(datos.apellidos));
                tr.append(creaCelda(datos.ciudad));
                tr.append(creaCelda(datos.edad));

                contenedor.append(tr);
                
                tr.on("click", function(){
                    tr.remove();

                    let indice = arrayCalculos.indexOf(datos.edad);

                    if (indice > -1){
                        arrayCalculos.splice(indice, 1);
                    }

                    let nuevosCalculos = {
                        suma: 0,
                        media: 0,
                        maximo: 0,
                        minimo: 9999
                    };

                    let resultado = calcular(nuevosCalculos);
                    pintarCalculos(resultado);
                });
            };

            function creaCelda(dato){
                let td = $("<td>");
                td.text(dato);
                return td;
            };

            function calcular(calculos){
                // Si el array está vacío, devolvemos todo a cero y salimos de la función
                if (arrayCalculos.length === 0) {
                    return { suma: 0, media: 0, maximo: 0, minimo: 0 };
                }

                // Si hay datos, aplicamos la lógica de comparación
                arrayCalculos.forEach(numero =>{
                        calculos.suma += parseInt(numero);
                        calculos.media = calculos.suma/arrayCalculos.length;

                        if (numero > calculos.maximo){
                            calculos.maximo = numero;
                        } 
                        if (numero < calculos.minimo){
                            calculos.minimo = numero;
                        }
                    });
                return calculos;
            };

            function pintarCalculos(calculos){
                $("#suma").text(calculos.suma);
                $("#media").text(calculos.media);
                $("#max").text(calculos.maximo);
                $("#min").text(calculos.minimo);
            }
        </script>
    </body>
</html>
